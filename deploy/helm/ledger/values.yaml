replicaCount: 1

nameOverride: ""
fullnameOverride: ""

image:
  repository: ghcr.io/tiana-code/fincore-ledger
  # Defaults to the chart appVersion when empty.
  tag: ""
  pullPolicy: IfNotPresent

imagePullSecrets: []

serviceAccount:
  create: true
  name: ""

service:
  type: ClusterIP
  port: 8080

# Prometheus Operator ServiceMonitor. Off by default; enable on a cluster running the operator.
serviceMonitor:
  enabled: false
  interval: 30s
  path: /actuator/prometheus

resources:
  requests:
    cpu: 250m
    memory: 512Mi
  limits:
    cpu: 1000m
    memory: 1Gi

autoscaling:
  enabled: true
  minReplicas: 1
  maxReplicas: 10
  targetCPUUtilizationPercentage: 70

# Non-secret environment surfaced through the ConfigMap. Probes assume the
# actuator stays on the main 8080 port, so leave springProfilesActive empty
# (the prod profile moves actuator to 9090 and would break the 8080 probes).
config:
  springProfilesActive: ""
  keycloakIssuerUri: ""
  otlpTracingEndpoint: ""
  cleanupEnabled: "false"
  datasourceUrl: ""
  datasourceUsername: ledger

# Name of a pre-existing Kubernetes Secret holding the credentials. The chart
# never contains secret values; it only references them. Leave empty to render
# without secret-backed env (for example during template validation).
existingSecret: ""
secretKeys:
  datasourcePassword: datasource-password
  keycloakClientSecret: keycloak-client-secret

podSecurityContext:
  runAsNonRoot: true
  runAsUser: 65532
  runAsGroup: 65532
  fsGroup: 65532
  seccompProfile:
    type: RuntimeDefault

securityContext:
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: true
  capabilities:
    drop:
      - ALL

probes:
  liveness:
    initialDelaySeconds: 30
    periodSeconds: 10
    timeoutSeconds: 3
    failureThreshold: 3
  readiness:
    initialDelaySeconds: 10
    periodSeconds: 5
    timeoutSeconds: 3
    failureThreshold: 6

# GitHub labels for FinCore Engine
# Apply with: gh label create --file .github/labels.yml
# Or via github-label-sync: npx github-label-sync --labels .github/labels.yml tiana-code/fincore-engine

# ============================================================
# Type - what kind of change
# ============================================================
- name: "type:bug"
  color: "d73a4a"
  description: "Defect in existing functionality"
- name: "type:feature"
  color: "0E8A16"
  description: "New capability or enhancement"
- name: "type:chore"
  color: "ededed"
  description: "Non-functional maintenance (deps, build, tooling)"
- name: "type:docs"
  color: "0075ca"
  description: "Documentation only"
- name: "type:refactor"
  color: "C2E0C6"
  description: "Code restructure without behavior change"
- name: "type:test"
  color: "BFD4F2"
  description: "Test code only"
- name: "type:security"
  color: "B60205"
  description: "Security fix or hardening"
- name: "type:perf"
  color: "FBCA04"
  description: "Performance improvement"

# ============================================================
# Priority
# ============================================================
- name: "P0"
  color: "B60205"
  description: "Critical - blocks release or production"
- name: "P1"
  color: "D93F0B"
  description: "High - must ship this iteration"
- name: "P2"
  color: "FBCA04"
  description: "Medium - ship within current sprint"
- name: "P3"
  color: "FEF2C0"
  description: "Low - nice to have"

# ============================================================
# Effort estimate
# ============================================================
- name: "effort:XS"
  color: "C5DEF5"
  description: "Less than 1 hour"
- name: "effort:S"
  color: "BFD4F2"
  description: "1-4 hours"
- name: "effort:M"
  color: "5319E7"
  description: "4-16 hours"
- name: "effort:L"
  color: "3B0F8A"
  description: "16-40 hours"
- name: "effort:XL"
  color: "1F0644"
  description: "More than 40 hours"

# ============================================================
# Area - which component
# ============================================================
- name: "area:ledger"
  color: "006B75"
  description: "Ledger service (accounts, transactions, balances)"
- name: "area:payments"
  color: "0E8A16"
  description: "Payment service (lifecycle, idempotency)"
- name: "area:compliance"
  color: "5319E7"
  description: "Compliance service (KYC, AML, cases)"
- name: "area:decision"
  color: "1D76DB"
  description: "Decision Engine (JSON DSL, evaluator)"
- name: "area:event-bus"
  color: "BFD4F2"
  description: "Outbox dispatcher, Kafka/Redpanda, event flow"
- name: "area:sandbox"
  color: "FEF2C0"
  description: "Sandbox adapters, seed data, demo"
- name: "area:observability"
  color: "C2E0C6"
  description: "Metrics, logs, traces, dashboards, alerts"
- name: "area:gateway"
  color: "006B75"
  description: "API gateway, auth, rate limit"
- name: "area:webhook"
  color: "1D76DB"
  description: "Inbound/outbound webhook handling"
- name: "area:infra"
  color: "8E44AD"
  description: "Build, CI/CD, Gradle, Docker, Helm"
- name: "area:docs"
  color: "0075ca"
  description: "Wiki, README, ADRs, blog content"
- name: "area:ui"
  color: "FF7619"
  description: "Sandbox React UI"

# ============================================================
# Status
# ============================================================
- name: "status:blocked"
  color: "B60205"
  description: "Blocked by external dependency"
- name: "status:needs-design"
  color: "FBCA04"
  description: "Needs design / ADR before implementation"
- name: "status:needs-review"
  color: "FEF2C0"
  description: "Awaiting code review"
- name: "status:in-progress"
  color: "0E8A16"
  description: "Actively being worked on"
- name: "status:wontfix"
  color: "ededed"
  description: "Won't fix - out of scope or design decision"
- name: "status:duplicate"
  color: "ededed"
  description: "Duplicate of another issue"

# ============================================================
# Special
# ============================================================
- name: "good-first-issue"
  color: "7057ff"
  description: "Good starter for new contributors"
- name: "help-wanted"
  color: "008672"
  description: "Maintainer requests community help"
- name: "breaking-change"
  color: "B60205"
  description: "Breaking change - bumps major version"
- name: "dependencies"
  color: "0366d6"
  description: "Dependency update (managed by Dependabot)"
- name: "Epic"
  color: "3B0F8A"
  description: "Epic - groups feature work spanning multiple issues"

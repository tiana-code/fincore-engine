name: Stale Issues and PRs

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

permissions:
  issues: write
  pull-requests: write

jobs:
  stale:
    name: Mark and Close Stale
    runs-on: ubuntu-latest

    permissions:
      issues: write
      pull-requests: write

    steps:
      - name: Mark stale issues and PRs
        uses: actions/stale@v10
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}

          days-before-issue-stale: 60
          days-before-issue-close: 14
          stale-issue-label: "status:stale"
          stale-issue-message: >
            This issue has been automatically marked as stale because it has had
            no activity for 60 days. It will be closed in 14 days if no further
            activity occurs. If this is still relevant, please leave a comment or
            remove the `status:stale` label.
          close-issue-message: >
            This issue was closed automatically after 14 days of inactivity since
            being marked stale. Feel free to re-open if it is still relevant.
          close-issue-reason: not_planned

          days-before-pr-stale: 60
          days-before-pr-close: 14
          stale-pr-label: "status:stale"
          stale-pr-message: >
            This pull request has been automatically marked as stale because it
            has had no activity for 60 days. It will be closed in 14 days if no
            further activity occurs. Please rebase and update, or close if no
            longer needed.
          close-pr-message: >
            This pull request was closed automatically after 14 days of inactivity
            since being marked stale.

          exempt-issue-labels: "P0,P1,Epic,status:in-progress,status:blocked,status:needs-design"
          exempt-pr-labels: "P0,P1,status:in-progress,status:blocked"
          exempt-all-milestones: true

          operations-per-run: 100

name: Release

on:
  push:
    tags:
      - "v*"

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write
  packages: write
  id-token: write

jobs:
  release:
    name: Build, Push & Release
    runs-on: ubuntu-latest

    permissions:
      contents: write
      packages: write
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 21 (Temurin)
        uses: actions/setup-java@v4
        with:
          java-version: "21"
          distribution: temurin

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Extract version from tag
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Run tests
        run: ./gradlew test integrationTest --no-daemon

      - name: Install cosign
        uses: sigstore/cosign-installer@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push ledger-service Docker image
        id: docker-build-ledger
        uses: docker/build-push-action@v6
        with:
          context: services/ledger
          file: services/ledger/Dockerfile
          push: true
          platforms: linux/amd64,linux/arm64
          tags: |
            ghcr.io/tiana-code/fincore-ledger:${{ steps.version.outputs.version }}
            ghcr.io/tiana-code/fincore-ledger:latest
          labels: |
            org.opencontainers.image.source=https://github.com/tiana-code/fincore-engine
            org.opencontainers.image.version=${{ steps.version.outputs.version }}
            org.opencontainers.image.licenses=BUSL-1.1
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Sign Docker image (ledger-service) with cosign
        run: |
          cosign sign --yes \
            ghcr.io/tiana-code/fincore-ledger@${{ steps.docker-build-ledger.outputs.digest }}

      - name: Set up Helm
        uses: azure/setup-helm@v4
        with:
          version: "3.16.x"

      - name: Package Helm chart
        run: |
          helm package deploy/helm/fincore-engine \
            --version ${{ steps.version.outputs.version }} \
            --app-version ${{ steps.version.outputs.version }} \
            --destination /tmp/helm-packages

      - name: Push Helm chart to GHCR OCI registry
        run: |
          helm push /tmp/helm-packages/fincore-engine-${{ steps.version.outputs.version }}.tgz \
            oci://ghcr.io/tiana-code/charts

      - name: Sign Helm chart with cosign
        run: |
          cosign sign --yes \
            ghcr.io/tiana-code/charts/fincore-engine:${{ steps.version.outputs.version }}

      - name: Generate SBOM (CycloneDX)
        run: ./gradlew cyclonedxBom --no-daemon

      - name: Create GitHub Release
        uses: googleapis/release-please-action@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          release-type: simple
          config-file: .github/release-please-config.json

      - name: Upload SBOM to release
        uses: softprops/action-gh-release@v2
        with:
          files: "**/build/reports/bom.json"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

name: CI

on:
  push:
    branches: ["main", "develop"]
  pull_request:
    branches: ["main", "develop"]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  checks: write
  pull-requests: write

jobs:
  build-test:
    name: Build & Test
    runs-on: ubuntu-latest

    permissions:
      contents: read
      checks: write
      pull-requests: write

    # Testcontainers spins up its own containers; no `services:` block needed.
    # Docker socket is available on GH-hosted ubuntu-latest runners by default.
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 21 (Temurin)
        uses: actions/setup-java@v4
        with:
          java-version: "21"
          distribution: temurin

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          cache-read-only: ${{ github.ref != 'refs/heads/main' && github.ref != 'refs/heads/develop' }}

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Format check (Spotless + ktlint)
        run: ./gradlew spotlessCheck --no-daemon --continue

      - name: detekt
        run: ./gradlew detekt --no-daemon --continue

      - name: Compile
        run: ./gradlew assemble --no-daemon

      - name: Unit tests
        run: ./gradlew test --no-daemon --continue
        env:
          TESTCONTAINERS_REUSE_ENABLE: "false"

      - name: Integration tests
        run: ./gradlew integrationTest --no-daemon --continue
        env:
          TESTCONTAINERS_REUSE_ENABLE: "false"

      - name: Publish test results
        uses: dorny/test-reporter@v1
        if: always()
        with:
          name: JUnit Results
          path: "**/build/test-results/**/*.xml"
          reporter: java-junit
          # Don't add a second, misleading failure when an earlier step (e.g.
          # format/compile) failed before any test XML was produced.
          fail-on-empty: false

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          files: "**/build/reports/jacoco/test/jacocoTestReport.xml"
          flags: unittests
          fail_ci_if_error: false
          token: ${{ secrets.CODECOV_TOKEN }}

  docker:
    name: Docker image
    runs-on: ubuntu-latest
    needs: build-test

    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Assert two named stages and distroless runtime base
        run: |
          grep -q 'AS builder' Dockerfile
          grep -q 'gcr.io/distroless/java21-debian12:nonroot AS runtime' Dockerfile

      - name: Build image
        run: docker build -t fincore-ledger:ci .

      - name: Assert nonroot runtime user
        run: |
          user=$(docker inspect -f '{{.Config.User}}' fincore-ledger:ci)
          echo "runtime user: $user"
          [ "$user" = "nonroot" ] || [ "$user" = "65532" ]

      - name: Assert image size under 300 MB
        run: |
          size=$(docker image inspect -f '{{.Size}}' fincore-ledger:ci)
          echo "image size: $((size / 1024 / 1024)) MB"
          [ "$size" -lt 314572800 ]

      - name: Smoke run (jvm launches the jar and spring boot starts)
        run: |
          timeout 90 docker run --rm fincore-ledger:ci --spring.profiles.active=test > out.log 2>&1 || true
          grep -q 'Starting LedgerApplication' out.log || { cat out.log; exit 1; }

      - name: Trivy image scan (no CRITICAL)
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: image
          image-ref: fincore-ledger:ci
          severity: CRITICAL
          exit-code: "1"
          ignore-unfixed: true
        env:
          TRIVY_DB_REPOSITORY: public.ecr.aws/aquasecurity/trivy-db
          TRIVY_JAVA_DB_REPOSITORY: public.ecr.aws/aquasecurity/trivy-java-db

  compose-smoke:
    name: Compose smoke
    runs-on: ubuntu-latest
    needs: build-test

    permissions:
      contents: read

    # Step order is load-bearing: smoke -> logs (on failure) -> teardown (always).
    # `docker compose down` removes containers, so logs must be dumped before it.
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Bring up stack
        run: docker compose up -d --build --wait --wait-timeout 180

      - name: Smoke (readiness < 30s, public surface served)
        run: |
          bash scripts/demo.sh http://localhost:8080
          bash scripts/demo.sh http://localhost:8081

      - name: Auth chain proof (token -> protected endpoint -> 200)
        run: bash scripts/demo-auth.sh

      - name: Dump container logs on failure
        if: failure()
        run: docker compose logs --no-color

      - name: Tear down stack
        if: always()
        run: docker compose down -v

  lint-security:
    name: Security Scan
    runs-on: ubuntu-latest
    needs: build-test

    permissions:
      contents: read
      security-events: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up JDK 21 (Temurin)
        uses: actions/setup-java@v4
        with:
          java-version: "21"
          distribution: temurin

      - name: Generate SBOM (CycloneDX via Syft)
        uses: anchore/sbom-action@v0
        with:
          format: cyclonedx-json
          output-file: sbom.cyclonedx.json

      - name: Upload SBOM artifact
        uses: actions/upload-artifact@v4
        with:
          name: sbom-cyclonedx
          path: sbom.cyclonedx.json
          retention-days: 90

      - name: Run Trivy vulnerability scanner (filesystem)
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: fs
          scan-ref: "."
          format: sarif
          output: trivy-results.sarif
          severity: HIGH,CRITICAL
          ignore-unfixed: true
        env:
          TRIVY_DB_REPOSITORY: public.ecr.aws/aquasecurity/trivy-db
          TRIVY_JAVA_DB_REPOSITORY: public.ecr.aws/aquasecurity/trivy-java-db

      - name: Upload Trivy SARIF results
        uses: github/codeql-action/upload-sarif@v3
        if: always() && hashFiles('trivy-results.sarif') != ''
        with:
          sarif_file: trivy-results.sarif
          category: trivy-fs

name: Dependency Submission

# GitHub does not parse build.gradle.kts on its own, so submit the resolved
# graph for Dependency Review and Dependabot alerts to use.
on:
  push:
    branches: ["main"]

permissions:
  contents: write

jobs:
  dependency-submission:
    name: Submit Gradle Dependency Graph
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "21"

      - name: Submit dependency graph
        uses: gradle/actions/dependency-submission@v6
        with:
          # Supply-chain enrichment feed for Dependabot, not a correctness gate
          # (build/test/security gates live in ci.yml). A platform-side rejection
          # - e.g. the repo dependency-graph feature flag being off - emits a
          # warning instead of failing trunk. Drop once the feature is confirmed on.
          dependency-graph-continue-on-failure: true

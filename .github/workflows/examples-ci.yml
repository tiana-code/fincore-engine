name: Examples CI

on:
  push:
    branches: ["main"]
    paths: ["examples/**", "sdk/typescript/**", ".github/workflows/examples-ci.yml"]
  pull_request:
    paths: ["examples/**", "sdk/typescript/**", ".github/workflows/examples-ci.yml"]

concurrency:
  group: examples-ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  node-quickstart:
    name: node-quickstart typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - name: Build the local SDK dependency
        working-directory: sdk/typescript
        run: |
          npm ci
          npm run build
      - name: Install and typecheck the example
        working-directory: examples/node-quickstart
        run: |
          npm install
          npm run typecheck
          npm run build

  webhook-receiver:
    name: webhook-receiver typecheck & test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: examples/webhook-receiver/package-lock.json
      - name: Install, typecheck, test and build
        working-directory: examples/webhook-receiver
        run: |
          npm ci
          npm run typecheck
          npm run test
          npm run build

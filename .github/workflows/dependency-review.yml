name: Dependency Review

on:
  pull_request:
    branches: ["main", "develop"]

permissions:
  contents: read
  pull-requests: write

jobs:
  dependency-review:
    name: Review Dependencies
    runs-on: ubuntu-latest

    permissions:
      contents: read
      pull-requests: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Non-blocking while the repo is private (the dependency-review API needs
      # GitHub Advanced Security on private repos). Becomes a real gate
      # automatically once the repo is public - no change needed.
      - name: Dependency Review
        uses: actions/dependency-review-action@v4
        continue-on-error: true
        with:
          fail-on-severity: high
          deny-licenses: AGPL-3.0, GPL-3.0, GPL-2.0
          comment-summary-in-pr: on-failure
          retry-on-snapshot-warnings: true

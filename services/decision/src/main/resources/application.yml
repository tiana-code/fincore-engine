server:
  port: 8080
  shutdown: graceful
spring:
  application:
    name: decision-service
  lifecycle:
    timeout-per-shutdown-phase: 30s
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/fincore}
    username: ${SPRING_DATASOURCE_USERNAME:fincore}
    password: ${SPRING_DATASOURCE_PASSWORD:fincore}
  jpa:
    hibernate:
      ddl-auto: none
    open-in-view: false
  liquibase:
    change-log: classpath:db/changelog/db.changelog-master.yaml
  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: ${KEYCLOAK_ISSUER_URI}

management:
  endpoint:
    health:
      probes:
        enabled: true
      show-components: always
      show-details: never
      group:
        liveness:
          include: livenessState
        readiness:
          include: readinessState,db
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  metrics:
    distribution:
      percentiles-histogram:
        http.server.requests: true
  tracing:
    sampling:
      probability: 0.1
  otlp:
    tracing:
      endpoint: ${OTLP_TRACING_ENDPOINT:http://localhost:4318/v1/traces}
logging:
  structured:
    format:
      console: logstash
fincore:
  decision:
    api:
      max-dsl-chars: 8192
      evaluation-timeout-millis: 200
      max-input-attributes: 64
      max-input-value-chars: 4096
      max-log-page-size: 100
      max-replay-inputs: 200

spring:
  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
  jpa:
    hibernate:
      ddl-auto: validate
  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: ${KEYCLOAK_ISSUER_URI}
management:
  server:
    port: 9090
  tracing:
    sampling:
      probability: ${TRACING_SAMPLING_PROBABILITY:0.1}
fincore:
  ledger:
    cleanup:
      enabled: true

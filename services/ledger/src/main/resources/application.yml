server:
  port: 8080
  shutdown: graceful
spring:
  application:
    name: ledger-service
  lifecycle:
    timeout-per-shutdown-phase: 30s
  jpa:
    hibernate:
      ddl-auto: none
  liquibase:
    change-log: classpath:db/changelog/db.changelog-master.yaml
  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: ${KEYCLOAK_ISSUER_URI}
fincore:
  ledger:
    idempotency:
      max-attempts: 3
springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
logging:
  structured:
    format:
      console: logstash
management:
  endpoint:
    health:
      probes:
        enabled: true
      show-components: always
      show-details: never
      validate-group-membership: false
      group:
        liveness:
          include: livenessState
        readiness:
          include: readinessState,db,liquibase
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  metrics:
    distribution:
      percentiles-histogram:
        http.server.requests: true
  tracing:
    sampling:
      probability: 0.1
  otlp:
    tracing:
      endpoint: ${OTLP_TRACING_ENDPOINT:http://localhost:4318/v1/traces}
